<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg">
<title>М-сеть автомата «Спидди»</title>
<desc>Схема связей М-сети автомата Спидди: входные узлы (Близость озера, Концентрация газа, Приказ), внутренние узлы (Опасность, Страх, Уверенность) с взаимными тормозными связями, выходные узлы (Отойти, Подойти)</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="inhibit" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<line x1="8" y1="1" x2="8" y2="9" stroke="context-stroke" stroke-width="2" stroke-linecap="round"/>
</marker>
</defs>

<!-- COLUMN LABELS -->
<text font-family="sans-serif" font-size="12" fill="#888" x="100" y="28" text-anchor="middle">Входные сигналы</text>
<text font-family="sans-serif" font-size="12" fill="#888" x="340" y="28" text-anchor="middle">Внутренние состояния</text>
<text font-family="sans-serif" font-size="12" fill="#888" x="572" y="28" text-anchor="middle">Действия</text>

<!-- INPUT NODES -->
<ellipse cx="100" cy="120" rx="72" ry="26" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="100" y="115" text-anchor="middle">1. Близость</text>
<text font-family="sans-serif" font-size="12" fill="#085041" x="100" y="130" text-anchor="middle">озера</text>

<ellipse cx="100" cy="220" rx="72" ry="26" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="100" y="215" text-anchor="middle">2. Концентрация</text>
<text font-family="sans-serif" font-size="12" fill="#085041" x="100" y="230" text-anchor="middle">газа</text>

<ellipse cx="100" cy="320" rx="72" ry="26" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#085041" x="100" y="324" text-anchor="middle">3. Приказ</text>

<!-- INTERNAL NODES -->
<ellipse cx="280" cy="170" rx="68" ry="26" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#633806" x="280" y="174" text-anchor="middle">4. Опасность</text>

<ellipse cx="400" cy="255" rx="56" ry="26" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#711B13" x="400" y="259" text-anchor="middle">5. Страх</text>

<ellipse cx="400" cy="355" rx="68" ry="26" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#0C447C" x="400" y="359" text-anchor="middle">6. Уверенность</text>

<!-- OUTPUT NODES -->
<ellipse cx="572" cy="255" rx="60" ry="26" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#444441" x="572" y="259" text-anchor="middle">7. Отойти</text>

<ellipse cx="572" cy="355" rx="60" ry="26" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#444441" x="572" y="359" text-anchor="middle">8. Подойти</text>

<!-- EXCITATORY CONNECTIONS -->
<line x1="170" y1="128" x2="212" y2="158" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="185" y="140">1.0</text>

<line x1="170" y1="214" x2="214" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M172 132 Q240 240 334 346" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="238" y="268">1.0</text>

<line x1="172" y1="320" x2="512" y2="355" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="370" y="342">0.5</text>

<line x1="318" y1="186" x2="370" y2="240" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="333" y="218">0.3</text>

<line x1="346" y1="174" x2="514" y2="244" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="456" y1="255" x2="512" y2="255" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="480" y="248">0.5</text>

<line x1="468" y1="355" x2="512" y2="355" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#aaa" x="484" y="348">0.3</text>

<!-- MUTUAL INHIBITORY CONNECTIONS -->
<path d="M392 280 Q370 308 392 330" stroke="#E24B4A" stroke-width="2" marker-end="url(#inhibit)" fill="none"/>
<path d="M408 330 Q430 308 408 280" stroke="#185FA5" stroke-width="2" marker-end="url(#inhibit)" fill="none"/>

<rect x="304" y="298" width="56" height="18" rx="4" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" fill="#888" x="332" y="311" text-anchor="middle">торможение</text>

<!-- LEGEND -->
<line x1="46" y1="398" x2="76" y2="398" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#888" x="82" y="402">возбуждающая связь</text>

<line x1="210" y1="398" x2="240" y2="398" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#888" x="246" y="402">слабая возбуждающая</text>

<line x1="390" y1="398" x2="420" y2="398" stroke="#E24B4A" stroke-width="2" marker-end="url(#inhibit)"/>
<text font-family="sans-serif" font-size="11" fill="#E24B4A" x="426" y="402">тормозная связь</text>

<!-- TITLE -->
<text font-family="sans-serif" font-size="11" fill="#aaa" x="340" y="430" text-anchor="middle">М-сеть автомата «Спидди» (матрица M₁) — Амосов и др., 1973</text>
</svg>
